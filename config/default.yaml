vehicle_info:
  wheel_base_m: 3.0
  vehicle_width_m: 1.85
  vehicle_length_m: 4.85
  axle_to_front_bumper_m: 3.90
  axle_to_rear_bumper_m: 0.95

planning:
  desired_speed: 16.66  # 60 km/h
  log_level: "info"     # options: trace, debug, info, warn, err, critical, off
  mppi_params:
    lambda: 2.5
    noise_sigma:
      jerk_std: 0.5
      steer_rate_std: 0.02
    num_samples: 8192
  cost_weights:
    position_weight: 15.0
    velocity_weight: 10.0
    heading_weight: 75.0
    accel_effort_weight: 10.0
    steer_effort_weight: 80.0
    jerk_effort_weight: 20.0
    steer_rate_effort_weight: 120.0
  constraint_limits:
    max_accel_mps2: 2.0
    min_accel_mps2: -4.0
    min_jerk_mps3: -1.5
    max_jerk_mps3: 1.5
    max_steer_rate_rps: 0.07
    max_steer_angle_rad: 0.15
    longitudinal_safety_margin_m: 2.0
    lateral_safety_margin_m: 0.6
    

simulator:
  scenario_file_path: "/home/puyu/codes/mppi-in-autonomous-driving/scenarios/static_test.xml"
  log_level: "info"
  save_mcap: true
  problem_id: 1
  perception_range_m: 120.0