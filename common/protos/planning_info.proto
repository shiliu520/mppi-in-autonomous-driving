syntax = "proto3";

package protos.planning;

message TrajectoryPoint {
  float pos_x = 1;
  float pos_y = 2;
  float velocity = 3;
  float heading = 4;
  float accel = 5;
  float steer = 6;
}

message Control {
  float jerk = 1;
  float steer_rate = 2;
}

message StateSeq {
  float cost = 1;
  repeated TrajectoryPoint trajectory = 2;
}

message Time {
    uint32 sec = 1;
    uint32 nsec = 2;
}

message Header {
    uint32 seq = 1;
    Time stamp = 2;
    string frame_id = 3;
}

message PlanningInfo {
    TrajectoryPoint current_state = 1;
    float target_accel = 2;
    float target_steer = 3;
    float cruise_velocity = 4;
    float cost_time_ms = 5;
    float optimal_cost = 6;
    repeated TrajectoryPoint optimal_trajectory = 7;
    repeated Control optimal_control_seq = 8;
    repeated float frame_cost_seq = 9;
    repeated StateSeq sample_xs = 10;
}